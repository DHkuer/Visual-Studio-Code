<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>循环练习</title>
</head>
<body>
<script>
    // 1. while 循环：计算还款达到本金2倍所需年数
    var bj=1,hk=bj,month=0;
    while(hk<2*bj){
        hk=hk*1.03;
        month++;
    }
    alert(month/12+'年以后需要还款的数额超过本金的2倍');

    // 2. while 循环：用户名密码登录验证
    var userName = prompt("请输入用户名");
    var passWord = prompt("请输入密码");
    while(userName!="admin"||passWord!="123456789"){
        alert("用户名或密码错误，请重新输入");
        userName = prompt("请输入用户名");
        passWord = prompt("请输入密码");
    }
    alert("登录成功");

    // 3. for 循环：随机数猜数字游戏（1~100随机，10次机会）
    var x,y;
    x = Math.floor(Math.random() * 100) + 1;
    for(var i=1;i<=10;i++){
        y = Number(prompt("请输入要猜的数值"));
        if(x==y){
            alert('恭喜猜对！总共用了'+i+'次机会');
            break;
        }
        if(y>x){
            alert('数字过大\n您还有'+(10-i)+'次机会');
        }
        else if(x>y){
            alert('数字过小\n您还有'+(10-i)+'次机会');
        }
        if(i == 10){
            alert('机会已用完！正确数字是：'+x);
        }
    }

    // 4. 新增：for 循环 九九乘法表（经典循环练习）
    var table = '';
    for(var i=1;i<=9;i++){
        for(var j=1;j<=i;j++){
            table += j + '×' + i + '=' + i*j + '\t';
        }
        table += '\n';
    }
    alert('九九乘法表：\n' + table);

    // 5. 新增：do-while 循环 简易ATM取款机（循环操作）
    var money = 1000;
    do{
        var opt = prompt('请选择操作：\n1. 取款\n2. 查询余额\n3. 退出');
        switch(opt){
            case '1':
                var take = Number(prompt('请输入取款金额：'));
                if(take>0 && take<=money){
                    money -= take;
                    alert('取款成功！当前余额：' + money);
                }else{
                    alert('取款金额无效！');
                }
                break;
            case '2':
                alert('当前余额：' + money);
                break;
            case '3':41
                alert('退出成功！');
                break;
            default:
                alert('输入有误，请重新选择');
        }
    }while(opt != '3');
</script>
</body>
</html>
